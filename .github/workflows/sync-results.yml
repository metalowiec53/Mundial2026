name: Sync match results

on:
  schedule:
    # Every 30 minutes — catches match results when API has data
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      teamA:
        description: "Kod drużyny A (np. MEX)"
        required: false
      teamB:
        description: "Kod drużyny B (np. RSA)"
        required: false
      scoreA:
        description: "Gole drużyny A"
        required: false
      scoreB:
        description: "Gole drużyny B"
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync endpoint
        run: |
          if [ -n "${{ github.event.inputs.teamA }}" ]; then
            curl --fail --show-error \
              "${{ secrets.APP_URL }}/api/sync-results?secret=${{ secrets.CRON_SECRET }}&teamA=${{ github.event.inputs.teamA }}&teamB=${{ github.event.inputs.teamB }}&scoreA=${{ github.event.inputs.scoreA }}&scoreB=${{ github.event.inputs.scoreB }}"
          else
            curl --fail --show-error \
              "${{ secrets.APP_URL }}/api/sync-results?secret=${{ secrets.CRON_SECRET }}"
          fi
